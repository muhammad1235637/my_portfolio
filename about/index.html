<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Muhammad's Portfolio</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #111114;
            --accent: #00d4ff; /* Tech Blue */
            --text: #e0e0e0;
            --text-dim: #666;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 25px 5%;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
        }

        .brand { font-weight: bold; font-size: 1.2rem; }
        .cursor { color: var(--accent); animation: blink 1s infinite; }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
        }

        .nav-links a:hover { color: var(--accent); }

        .hero-block {
            padding: 100px 5%;
            max-width: 1200px;
        }

        .label {
            color: var(--accent);
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin: 20px 0;
            font-weight: 800;
            line-height: 1.1;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1px;
            background: var(--border);
            border-top: 1px solid var(--border);
        }

        .grid-item {
            background: var(--bg);
            padding: 40px;
            transition: background 0.3s;
        }

        .grid-item:hover { background: var(--panel); }

        .grid-item .header {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .grid-item h3 { color: var(--accent); margin: 0 0 15px 0; }

        .system-footer {
            display: flex;
            justify-content: space-between;
            padding: 30px 5%;
            border-top: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .status-box { display: flex; align-items: center; }
        .dot { height: 6px; width: 6px; border-radius: 50%; margin-right: 10px; }
        .green { background: #00ff66; box-shadow: 0 0 10px #00ff66; }

        @keyframes blink { 50% { opacity: 0; } }

        /* About Page Specifics */
        .about-container {
            padding: 60px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bio-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            margin-bottom: 80px;
        }

        .bio-block {
            background: var(--panel);
            padding: 40px;
            border: 1px solid var(--border);
            position: relative;
        }

        .active-link { color: var(--accent) !important; }

        .stats-row {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        .stat { display: flex; flex-direction: column; }
        .stat .val { font-size: 1.5rem; font-weight: 800; color: var(--accent); font-family: monospace; }
        .stat .key { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

        .stack-category { margin-bottom: 20px; }
        .stack-category h4 { color: var(--accent); margin-bottom: 5px; font-size: 0.9rem; font-family: monospace; }
        .stack-category p { font-size: 0.9rem; color: var(--text-dim); }

        /* Experience Log */
        .experience-log {
            border-top: 1px solid var(--border);
            padding-top: 40px;
        }

        .log-entry {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            padding: 20px;
            border-left: 2px solid var(--border);
            transition: 0.3s;
        }

        .log-entry:hover {
            border-left-color: var(--accent);
            background: rgba(0, 212, 255, 0.02);
        }

        .timestamp {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--accent);
            white-space: nowrap;
        }

        .log-content h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .log-content p { font-size: 0.9rem; color: var(--text-dim); }

        @media (max-width: 768px) {
            .bio-grid { grid-template-columns: 1fr; }
            .log-entry { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="brand"><a href="/" style="text-decoration:none; color:inherit;">MUHAMMAD</a><span class="cursor">'S</span> PORTFOLIO</div>
        <div class="nav-links">
            <a href="/about" class="active-link">/about</a>
            <a href="/projects">/projects</a>
            <a href="/certs">/certificates</a>
        </div>
    </header>

<main class="cv-content">
    <section class="cv-section">
        <h2>SUMMARY</h2>
        <p></p>
    </section>

    <section class="cv-section experience-list">
        </section>
    
    <section class="cv-section contact-cta">
        ...
    </section>
</main>

<script src="about.js"></script>

    <footer class="system-footer">
        <div class="status-box">
            <div class="dot green"></div>
            <span>MUHAMMAD'S PORTFOLIO</span>
        </div>
        <div class="copy">POWERED BY BITCYBERBOX // 2026</div>
    </footer>

</body>
</html>
